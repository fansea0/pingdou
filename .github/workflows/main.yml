name: build_ping_dou

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "vite.config.ts"
      - ".env"
      - ".env.*"
      - ".github/workflows/build_ping_dou.yml"

jobs:
  deploy:
    name: 部署拼豆项目
    runs-on: ubuntu-latest

    steps:
      - name: 安装 SSH 工具
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: 部署到服务器
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: root
          PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$USER@$HOST" << 'EOF'

          set -e

          PROJECT_DIR="/root/project/pingdou"
          SERVICE_PORT="5173"
          LOG_FILE="$PROJECT_DIR/start.log"
          PID_FILE="$PROJECT_DIR/start.pid"

          cd "$PROJECT_DIR"

          echo "=============================="
          echo "开始部署拼豆项目"
          echo "项目目录：$PROJECT_DIR"
          echo "=============================="

          # ============================================
          # 新增：重置本地修改，避免冲突
          # ============================================
          echo "重置本地仓库状态..."

          # 1. 丢弃所有本地未提交的修改（包括新增文件）
          git reset --hard HEAD

          # 2. 删除所有未被 Git 跟踪的文件和目录（如 node_modules、.env 等不会被删除，因为它们在 .gitignore 中）
          #    注意：这不会删除 .gitignore 中列出的文件
          git clean -fd

          # 3. 可选：如果你希望彻底清理包括 .gitignore 中的文件，使用 -x 参数
          #    但注意这会删除 node_modules，需要重新安装
          # git clean -fdx

          echo "本地仓库已重置，开始拉取最新代码..."
          # ============================================

          OLD_COMMIT=$(git rev-parse HEAD)

          echo "当前版本：$OLD_COMMIT"
          echo "拉取最新代码..."

          git pull --ff-only

          NEW_COMMIT=$(git rev-parse HEAD)

          echo "最新版本：$NEW_COMMIT"

          NEED_INSTALL=false

          if [ "$OLD_COMMIT" != "$NEW_COMMIT" ]; then
            CHANGED_FILES=$(git diff --name-only "$OLD_COMMIT" "$NEW_COMMIT")

            echo "本次修改文件："
            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -Eq \
              '^(package\.json|package-lock\.json)$'; then
              NEED_INSTALL=true
            fi
          else
            echo "没有检测到新的代码提交"
          fi

          # ============================================
          # 修改：如果使用 git clean -fd，node_modules 不会被删除，无需重新安装
          # 如果使用 git clean -fdx，node_modules 会被删除，必须重新安装
          # 这里保持原有逻辑，仅在 package.json 变化时重新安装
          # ============================================
          if [ "$NEED_INSTALL" = true ]; then
            echo "依赖文件发生变化，重新安装依赖..."

            # 清理旧依赖（可选，确保干净）
            rm -rf node_modules 2>/dev/null || true

            if [ -f package-lock.json ]; then
              npm install
            else
              npm install
            fi
          fi

          echo "停止旧服务..."

          if [ -f "$PID_FILE" ]; then
            OLD_PID=$(cat "$PID_FILE")

            if kill -0 "$OLD_PID" >/dev/null 2>&1; then
              echo "停止旧服务，PID：$OLD_PID"

              kill "$OLD_PID" 2>/dev/null || true

              for i in $(seq 1 10); do
                if ! kill -0 "$OLD_PID" >/dev/null 2>&1; then
                  break
                fi

                sleep 1
              done

              if kill -0 "$OLD_PID" >/dev/null 2>&1; then
                echo "旧服务未正常退出，强制停止"
                kill -9 "$OLD_PID" 2>/dev/null || true
              fi
            fi

            rm -f "$PID_FILE"
          fi

          # 兜底：清理仍在运行的 npm run start 进程
          pkill -f "npm run start" 2>/dev/null || true

          sleep 1

          echo "启动新服务..."

          nohup npm run start \
            > "$LOG_FILE" 2>&1 &

          NEW_PID=$!
          echo "$NEW_PID" > "$PID_FILE"

          echo "新服务 PID：$NEW_PID"
          echo "等待服务启动..."

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3000" >/dev/null 2>&1; then
              echo "=============================="
              echo "服务启动成功"
              echo "服务端口：$SERVICE_PORT"
              echo "进程 PID：$NEW_PID"
              echo "=============================="
              exit 0
            fi

            if ! kill -0 "$NEW_PID" >/dev/null 2>&1; then
              echo "服务进程已经退出"
              echo "最近 100 行日志："
              tail -n 100 "$LOG_FILE" || true
              exit 1
            fi

            echo "第 $i/30 次检查，服务尚未就绪..."
            sleep 2
          done

          echo "=============================="
          echo "服务启动失败或等待超时"
          echo "=============================="

          echo "最近 100 行日志："
          tail -n 100 "$LOG_FILE" || true

          exit 1

          EOF
