name: build_ping_dou

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "vite.config.ts"
      - ".env"
      - ".env.*"
      - ".github/workflows/build_ping_dou.yml"

jobs:
  deploy:
    name: 部署拼豆项目
    runs-on: ubuntu-latest

    steps:
      - name: 安装 SSH 工具
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: 部署到服务器
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: root
          PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$USER@$HOST" << 'EOF'

          set -e

          PROJECT_DIR="/root/project/pingdou"
          SERVICE_PORT="3000"
          LOG_FILE="$PROJECT_DIR/start.log"
          PID_FILE="$PROJECT_DIR/start.pid"

          cd "$PROJECT_DIR"

          echo "=============================="
          echo "开始部署拼豆项目"
          echo "项目目录：$PROJECT_DIR"
          echo "服务端口：$SERVICE_PORT"
          echo "=============================="

          echo "重置本地仓库状态..."

          git reset --hard HEAD
          git clean -fd

          OLD_COMMIT=$(git rev-parse HEAD)

          echo "当前版本：$OLD_COMMIT"
          echo "拉取最新代码..."

          git pull --ff-only

          NEW_COMMIT=$(git rev-parse HEAD)

          echo "最新版本：$NEW_COMMIT"

          NEED_INSTALL=false

          if [ ! -d "node_modules" ]; then
            echo "node_modules 不存在，需要安装依赖"
            NEED_INSTALL=true
          fi

          if [ "$OLD_COMMIT" != "$NEW_COMMIT" ]; then
            CHANGED_FILES=$(git diff --name-only "$OLD_COMMIT" "$NEW_COMMIT")

            echo "本次修改文件："
            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -Eq \
              '^(package\.json|package-lock\.json)$'; then
              NEED_INSTALL=true
            fi
          else
            echo "没有检测到新的代码提交"
          fi

          if [ "$NEED_INSTALL" = true ]; then
            echo "开始安装依赖..."
            npm i
          else
            echo "依赖未发生变化，跳过安装"
          fi

          echo "停止旧服务..."

          # 根据 PID 文件停止旧服务
          if [ -f "$PID_FILE" ]; then
            OLD_PID=$(cat "$PID_FILE" 2>/dev/null || true)

            if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" >/dev/null 2>&1; then
              echo "强制停止旧服务，PID：$OLD_PID"
              kill -9 "$OLD_PID" 2>/dev/null || true
            fi

            rm -f "$PID_FILE"
          fi

          # 兜底：停止 npm run start 进程
          pkill -9 -f "npm run start" 2>/dev/null || true

          echo "检查 ${SERVICE_PORT} 端口占用..."

          ss -lntp | grep ":${SERVICE_PORT}" || true

          # 从 ss 输出中提取占用 3000 端口的 PID
          PORT_PIDS=$(
            ss -lntp 2>/dev/null |
            grep ":${SERVICE_PORT}" |
            grep -o 'pid=[0-9]*' |
            cut -d= -f2 |
            sort -u || true
          )

          if [ -n "$PORT_PIDS" ]; then
            echo "${SERVICE_PORT} 端口被以下进程占用："
            echo "$PORT_PIDS"

            for PID in $PORT_PIDS; do
              echo "执行 kill -9 $PID"
              kill -9 "$PID" 2>/dev/null || true
            done
          else
            echo "${SERVICE_PORT} 端口未被占用"
          fi

          sleep 1

          echo "再次检查 ${SERVICE_PORT} 端口..."

          if ss -lntp | grep -q ":${SERVICE_PORT}"; then
            echo "错误：${SERVICE_PORT} 端口仍然被占用"
            ss -lntp | grep ":${SERVICE_PORT}" || true
            exit 1
          fi

          echo "${SERVICE_PORT} 端口已释放"
          echo "启动新服务..."

          nohup npm run start -- --port "$SERVICE_PORT" --strictPort \
            > "$LOG_FILE" 2>&1 &

          NEW_PID=$!
          echo "$NEW_PID" > "$PID_FILE"

          echo "新服务 PID：$NEW_PID"
          echo "等待服务启动..."

          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${SERVICE_PORT}" >/dev/null 2>&1; then
              echo "=============================="
              echo "服务启动成功"
              echo "服务端口：$SERVICE_PORT"
              echo "进程 PID：$NEW_PID"
              echo "=============================="
              exit 0
            fi

            if ! kill -0 "$NEW_PID" >/dev/null 2>&1; then
              echo "服务进程已经退出"
              echo "最近 100 行日志："
              tail -n 100 "$LOG_FILE" || true
              exit 1
            fi

            echo "第 $i/30 次检查，服务尚未就绪..."
            sleep 2
          done

          echo "=============================="
          echo "服务启动失败或等待超时"
          echo "=============================="

          echo "当前端口占用："
          ss -lntp | grep ":${SERVICE_PORT}" || true

          echo "最近 100 行日志："
          tail -n 100 "$LOG_FILE" || true

          exit 1

          EOF

